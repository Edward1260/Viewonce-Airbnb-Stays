<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Storage - Airbnb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="text-6xl mb-4">🧹</div>
        <h1 class="text-2xl font-bold mb-4">Clear Session Data</h1>
        <p class="text-gray-600 mb-6">
            This will clear all local storage data including login session and cached user information.
        </p>
        <button onclick="clearStorage()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-xl mb-4">
            Clear All Data
        </button>
        <a href="index.html" class="block text-blue-500 hover:underline">
            Go to Welcome Page →
        </a>
    </div>

    <script>
        function clearStorage() {
            // Clear all localStorage
            localStorage.clear();
            
            // Clear sessionStorage
            sessionStorage.clear();
            
            // Show success message
            alert('All session data has been cleared!');
            
            // Redirect to welcome page
            window.location.href = 'index.html';
        }
        
        // Auto-clear on page load
        window.addEventListener('load', function() {
            // Optionally auto-clear
            // clearStorage();
        });
    </script>
</body>
</html>
