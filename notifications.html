<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Airbnb Customer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="store.js"></script>
    <script src="api.js"></script>
    <script src="router.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --glass-bg: rgba(255, 255, 255, 0.15); --glass-border: rgba(255, 255, 255, 0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #667eea, #764ba2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); }
        .glass-hover { transition: all 0.3s ease; }
        .glass-hover:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-2px); }
        .notification-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-radius: 20px; transition: all 0.3s ease; }
        .notification-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15); }
        .notification-card.unread { border-left: 4px solid var(--primary); background: rgba(99, 102, 241, 0.1); }
        .btn-neon { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 50px; padding: 12px 28px; font-weight: 600; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); transition: all 0.3s ease; }
        .btn-neon:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6); }
        header { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="min-h-screen">
    <header class="w-full flex items-center justify-between px-6 py-4 glass fixed top-0 z-50">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='customer-dashboard.html'" class="text-white hover:text-gray-200 font-medium transition">← Back to Dashboard</button>
            <h1 class="font-bold text-xl text-white drop-shadow-lg">Notifications</h1>
        </div>
    </header>

    <div class="max-w-4xl mx-auto pt-24 px-6 pb-12">
        <div class="glass p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold text-white drop-shadow-lg">Your Notifications</h2>
                <div class="flex gap-3">
                    <button onclick="markAllAsRead()" class="btn-neon text-sm">Mark All as Read</button>
                    <button onclick="clearAll()" class="px-4 py-2 bg-red-500 text-white rounded-xl hover:bg-red-600 transition text-sm">Clear All</button>
                </div>
            </div>
            
            <div class="space-y-4" id="notificationsList">
                <div class="notification-card unread p-5 cursor-pointer" onclick="markAsRead(this)">
                    <div class="flex justify-between items-start">
                        <div class="flex gap-4">
                            <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-2xl">✅</div>
                            <div>
                                <h3 class="font-bold text-gray-800">Booking Confirmed</h3>
                                <p class="text-gray-600">Your stay at Mountain Retreat is confirmed for Dec 20.</p>
                                <p class="text-xs text-gray-400 mt-2">3 hours ago</p>
                            </div>
                        </div>
                        <button onclick="deleteNotification(this.parentElement.parentElement)" class="text-gray-400 hover:text-red-500 text-xl">✕</button>
                    </div>
                </div>
                <div class="notification-card unread p-5 cursor-pointer" onclick="markAsRead(this)">
                    <div class="flex justify-between items-start">
                        <div class="flex gap-4">
                            <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center text-2xl">💰</div>
                            <div>
                                <h3 class="font-bold text-gray-800">Price Drop Alert</h3>
                                <p class="text-gray-600">Urban Studio price dropped by 10%!</p>
                                <p class="text-xs text-gray-400 mt-2">1 day ago</p>
                            </div>
                        </div>
                        <button onclick="deleteNotification(this.parentElement.parentElement)" class="text-gray-400 hover:text-red-500 text-xl">✕</button>
                    </div>
                </div>
                <div class="notification-card p-5 cursor-pointer" onclick="markAsRead(this)">
                    <div class="flex justify-between items-start">
                        <div class="flex gap-4">
                            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-2xl">👋</div>
                            <div>
                                <h3 class="font-bold text-gray-800">Welcome to Airbnb</h3>
                                <p class="text-gray-600">Thanks for joining! Explore amazing stays.</p>
                                <p class="text-xs text-gray-400 mt-2">1 week ago</p>
                            </div>
                        </div>
                        <button onclick="deleteNotification(this.parentElement.parentElement)" class="text-gray-400 hover:text-red-500 text-xl">✕</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!isLoggedIn || user.role !== 'customer') {
                window.location.href = 'login-signup.html';
            }
        });

        function markAsRead(notification) {
            notification.classList.remove('unread');
            notification.style.borderLeft = 'none';
        }

        function deleteNotification(notification) {
            notification.remove();
        }

        function markAllAsRead() {
            document.querySelectorAll('.notification-card').forEach(n => n.classList.remove('unread'));
        }

        function clearAll() {
            if (confirm('Clear all notifications?')) {
                document.getElementById('notificationsList').innerHTML = '<p class="text-white/60 text-center py-8">No notifications</p>';
            }
        }
    </script>
</body>
</html>
