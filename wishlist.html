<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - Airbnb Customer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="store.js"></script>
    <script src="api.js"></script>
    <script src="router.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --glass-bg: rgba(255, 255, 255, 0.15); --glass-border: rgba(255, 255, 255, 0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #667eea, #764ba2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); }
        .glass-hover { transition: all 0.3s ease; }
        .glass-hover:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-5px); }
        .btn-neon { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 50px; padding: 12px 28px; font-weight: 600; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); transition: all 0.3s ease; }
        .btn-neon:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6); }
        .btn-gradient { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; border-radius: 16px; padding: 12px 24px; font-weight: 600; transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-3px); }
        header { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .property-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-radius: 20px; transition: all 0.3s ease; overflow: hidden; }
        .property-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2); }
        .property-card img { transition: transform 0.5s ease; }
        .property-card:hover img { transform: scale(1.1); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 600; }
        .modal-glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 24px; padding: 24px; max-width: 400px; width: 90%; }
    </style>
</head>
<body class="min-h-screen">
    <header class="w-full flex items-center justify-between px-6 py-4 glass fixed top-0 z-50">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='customer-dashboard.html'" class="text-white hover:text-gray-200 font-medium transition">← Back to Dashboard</button>
            <h1 class="font-bold text-xl text-white drop-shadow-lg">My Wishlist</h1>
        </div>
    </header>

    <div class="max-w-6xl mx-auto pt-24 px-6 pb-12">
        <div class="glass p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold text-white">Saved Properties</h2>
                <button onclick="bookSelected()" class="btn-neon" id="bookSelectedBtn" style="display: none;">Book Selected</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="wishlistContainer">
                <div class="property-card glass-hover">
                    <div class="relative">
                        <input type="checkbox" class="absolute top-3 left-3 w-6 h-6" onchange="updateSelection()">
                        <img src="https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?auto=format&fit=crop&w=800&q=80" alt="Property" class="w-full h-56 object-cover">
                    </div>
                    <div class="p-5">
                        <h3 class="font-bold text-gray-800 text-lg mb-1">Mountain Retreat</h3>
                        <p class="text-gray-600 text-sm mb-2">Aberdare Ranges, Kenya</p>
                        <div class="flex items-center justify-between">
                            <span class="text-xl font-bold text-gray-800">Ksh 8,500</span>
                            <div class="flex items-center gap-1">
                                <span class="text-yellow-400">⭐</span>
                                <span class="text-gray-600">4.8</span>
                            </div>
                        </div>
                        <button class="w-full mt-4 bg-red-500 text-white py-2 rounded-xl hover:bg-red-600 transition" onclick="removeFromWishlist(this)">Remove</button>
                    </div>
                </div>
            </div>

            <div class="mt-8 text-center">
                <p class="text-white/60">No more saved properties</p>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div class="modal" id="wishlistPaymentModal">
        <div class="modal-glass">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-xl text-gray-800">Complete Your Booking</h3>
                <button onclick="closePaymentModal()" class="text-2xl font-bold text-gray-500 hover:text-gray-700">×</button>
            </div>
            <p class="text-gray-600 mb-4">Total: <span class="font-bold text-xl" id="wishlistTotal">KSh 0</span></p>
            <div class="space-y-3 mb-6">
                <label class="flex items-center p-3 border rounded-xl cursor-pointer hover:bg-gray-50">
                    <input type="radio" name="wishlistPayment" value="card" class="mr-3" checked>
                    <span>💳 Credit/Debit Card</span>
                </label>
                <label class="flex items-center p-3 border rounded-xl cursor-pointer hover:bg-gray-50">
                    <input type="radio" name="wishlistPayment" value="mpesa" class="mr-3">
                    <span>📱 M-Pesa</span>
                </label>
                <label class="flex items-center p-3 border rounded-xl cursor-pointer hover:bg-gray-50">
                    <input type="radio" name="wishlistPayment" value="cash" class="mr-3">
                    <span>💵 Cash on Arrival</span>
                </label>
            </div>
            <button onclick="processWishlistPayment()" class="w-full btn-gradient py-3">Complete Payment</button>
        </div>
    </div>

    <script>
        let selectedProperties = [];

        document.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!isLoggedIn || user.role !== 'customer') {
                window.location.href = 'auth.html';
                return;
            }
            document.getElementById('wishlistPaymentModal').addEventListener('click', function(e) {
                if (e.target === this) this.style.display = 'none';
            });
            loadWishlist();
        });

        async function loadWishlist() {
            try {
                const items = await api.getWishlist();
                if (items && items.length > 0) {
                    const container = document.getElementById('wishlistContainer');
                    // Dynamically render items from API instead of hardcoded ones
                }
            } catch (error) {
                console.error('Failed to load wishlist:', error);
            }
        }

        function updateSelection() {
            const checkboxes = document.querySelectorAll('#wishlistContainer input[type="checkbox"]');
            selectedProperties = Array.from(checkboxes).filter(cb => cb.checked).map(cb => {
                const card = cb.closest('.property-card');
                return {
                    title: card.querySelector('h3').textContent,
                    price: parseInt(card.querySelector('.font-bold').textContent.replace('Ksh ', '').replace(',', ''))
                };
            });
            const bookBtn = document.getElementById('bookSelectedBtn');
            bookBtn.style.display = selectedProperties.length > 0 ? 'block' : 'none';
        }

        function bookSelected() {
            if (selectedProperties.length === 0) { alert('Select at least one property.'); return; }
            const total = selectedProperties.reduce((sum, prop) => sum + prop.price, 0);
            document.getElementById('wishlistTotal').textContent = 'KSh ' + total.toLocaleString();
            document.getElementById('wishlistPaymentModal').style.display = 'flex';
        }

        function closePaymentModal() { document.getElementById('wishlistPaymentModal').style.display = 'none'; }

        function processWishlistPayment() {
            const selectedPayment = document.querySelector('input[name="wishlistPayment"]:checked');
            if (!selectedPayment) { alert('Select a payment method.'); return; }
            const propertiesText = selectedProperties.map(p => p.title).join(', ');
            alert('Payment processed via ' + selectedPayment.value + '! Booking for ' + propertiesText + ' confirmed.');
            document.getElementById('wishlistPaymentModal').style.display = 'none';
            selectedProperties = [];
            document.querySelectorAll('#wishlistContainer input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.getElementById('bookSelectedBtn').style.display = 'none';
        }

        function removeFromWishlist(btn) {
            if (confirm('Remove from wishlist?')) {
                btn.parentElement.parentElement.remove();
            }
        }
    </script>
</body>
</html>
