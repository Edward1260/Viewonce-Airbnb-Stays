<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My History - Airbnb Kenya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config-fixed.js?v=6"></script>
    <script src="store.js"></script>
    <script src="api.js"></script>
    <script src="router.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#374151">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Grey Background */
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #374151 0%, #4b5563 25%, #6b7280 50%, #4b5563 75%, #374151 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f3f4f6;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .floating-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        
        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .glass-hover:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
        }
        
        header {
            background: rgba(55, 65, 81, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-neon {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }
        .btn-neon:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
        }
        
        .history-card {
            transition: all 0.3s ease;
            border-left: 4px solid var(--primary);
        }
        
        .history-card:hover {
            border-left-color: #10b981;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-confirmed { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-cancelled { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .status-completed { background: rgba(99, 102, 241, 0.2); color: #6366f1; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .tab-btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            background: transparent;
            color: #9ca3af;
            border: none;
            cursor: pointer;
        }
        .tab-btn:hover { color: #f3f4f6; }
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body class="min-h-screen relative">
    <div class="floating-shapes">
        <div style="position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%); top: 10%; left: 10%; animation: float 20s infinite;"></div>
        <div style="position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%); bottom: 20%; right: 15%; animation: float 15s infinite; animation-delay: -5s;"></div>
    </div>
    <style>
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -30px) rotate(5deg); }
            50% { transform: translate(-10px, 20px) rotate(-3deg); }
            75% { transform: translate(30px, 10px) rotate(7deg); }
        }
    </style>

    <!-- Header -->
    <header class="w-full flex items-center justify-between px-6 py-4 fixed top-0 z-50">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='customer-dashboard.html'" class="text-white hover:text-purple-400 font-medium transition">← Back</button>
            <h1 class="font-bold text-xl text-white">📜 My History</h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="window.location.href='ai-chat.html'" class="text-white hover:text-purple-400 font-medium transition">🤖 AI</button>
            <button onclick="window.location.href='customer-dashboard.html'" class="text-white hover:text-purple-400 font-medium transition">Dashboard</button>
        </div>
    </header>

    <div class="pt-24 px-6 pb-6 relative z-10 max-w-6xl mx-auto">
        <!-- Welcome Section -->
        <div class="glass p-6 mb-6">
            <h1 id="welcome-header" class="text-3xl font-bold text-white mb-2">My Booking History</h1>
            <p class="text-gray-300">View all your past and current reservations</p>
        </div>

        <!-- Filter Tabs -->
        <div class="flex flex-wrap gap-3 mb-6">
            <button onclick="filterHistory('all')" id="tab-all" class="tab-btn active">All Bookings</button>
            <button onclick="filterHistory('completed')" id="tab-completed" class="tab-btn">Completed</button>
            <button onclick="filterHistory('upcoming')" id="tab-upcoming" class="tab-btn">Upcoming</button>
            <button onclick="filterHistory('cancelled')" id="tab-cancelled" class="tab-btn">Cancelled</button>
        </div>

        <!-- History Content -->
        <div id="history-content" class="space-y-4">
            <div class="glass p-8 text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-white border-t-transparent mx-auto mb-4"></div>
                <p class="text-gray-300">Loading your history...</p>
            </div>
        </div>

        <!-- Summary Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-6">
            <div class="glass p-4 text-center">
                <p class="text-3xl font-bold text-white" id="total-bookings">0</p>
                <p class="text-gray-400 text-sm">Total Bookings</p>
            </div>
            <div class="glass p-4 text-center">
                <p class="text-3xl font-bold text-green-400" id="completed-bookings">0</p>
                <p class="text-gray-400 text-sm">Completed</p>
            </div>
            <div class="glass p-4 text-center">
                <p class="text-3xl font-bold text-yellow-400" id="upcoming-bookings">0</p>
                <p class="text-gray-400 text-sm">Upcoming</p>
            </div>
            <div class="glass p-4 text-center">
                <p class="text-3xl font-bold text-purple-400" id="total-spent">KSh 0</p>
                <p class="text-gray-400 text-sm">Total Spent</p>
            </div>
        </div>
    </div>

    <script>
        let allBookings = [];
        let currentFilter = 'all';

        // Check authentication
        document.addEventListener('DOMContentLoaded', async function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (!isLoggedIn) {
                window.location.href = 'login-signup.html';
                return;
            }
            
            await loadHistory();
        });

        async function loadHistory() {
            const container = document.getElementById('history-content');
            
            try {
                // Fetch bookings from API
                const bookings = await api.getBookings();
                allBookings = bookings || [];
                
                // Update stats
                updateStats();
                
                // Display bookings
                displayBookings();
                
            } catch (error) {
                console.error('Error loading history:', error);
                container.innerHTML = `
                    <div class="glass p-8 text-center">
                        <p class="text-4xl mb-4">⚠️</p>
                        <p class="text-gray-300 mb-4">Unable to load your history</p>
                        <button onclick="loadHistory()" class="btn-neon">Try Again</button>
                    </div>
                `;
            }
        }

        function updateStats() {
            const total = allBookings.length;
            const completed = allBookings.filter(b => b.status === 'completed').length;
            const upcoming = allBookings.filter(b => b.status === 'confirmed' || b.status === 'pending').length;
            const totalSpent = allBookings.reduce((sum, b) => sum + (b.totalPrice || b.price || 0), 0);
            
            document.getElementById('total-bookings').textContent = total;
            document.getElementById('completed-bookings').textContent = completed;
            document.getElementById('upcoming-bookings').textContent = upcoming;
            document.getElementById('total-spent').textContent = 'KSh ' + totalSpent.toLocaleString();
        }

        function displayBookings() {
            const container = document.getElementById('history-content');
            
            // Filter bookings
            let filteredBookings = allBookings;
            if (currentFilter === 'completed') {
                filteredBookings = allBookings.filter(b => b.status === 'completed');
            } else if (currentFilter === 'upcoming') {
                filteredBookings = allBookings.filter(b => b.status === 'confirmed' || b.status === 'pending');
            } else if (currentFilter === 'cancelled') {
                filteredBookings = allBookings.filter(b => b.status === 'cancelled');
            }

            if (filteredBookings.length === 0) {
                let emptyMessage = '';
                if (currentFilter === 'all') {
                    emptyMessage = 'You haven\'t made any bookings yet.';
                } else if (currentFilter === 'completed') {
                    emptyMessage = 'No completed bookings found.';
                } else if (currentFilter === 'upcoming') {
                    emptyMessage = 'No upcoming bookings.';
                } else {
                    emptyMessage = 'No cancelled bookings.';
                }
                
                container.innerHTML = `
                    <div class="glass p-8 text-center">
                        <p class="text-6xl mb-4">📜</p>
                        <p class="text-xl text-gray-300 mb-2">${emptyMessage}</p>
                        <p class="text-gray-400 mb-6">Start exploring properties to make your first booking!</p>
                        <button onclick="window.location.href='index.html'" class="btn-neon">Find Properties</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredBookings.map(booking => {
                const propTitle = booking.property?.title || booking.propertyTitle || 'Property';
                const checkIn = booking.checkIn ? new Date(booking.checkIn).toLocaleDateString() : 'N/A';
                const checkOut = booking.checkOut ? new Date(booking.checkOut).toLocaleDateString() : 'N/A';
                const totalPrice = booking.totalPrice || booking.price || 0;
                const status = booking.status || 'confirmed';
                
                let statusBadge = '';
                if (status === 'confirmed') statusBadge = '<span class="status-badge status-confirmed">Confirmed</span>';
                else if (status === 'pending') statusBadge = '<span class="status-badge status-pending">Pending</span>';
                else if (status === 'cancelled') statusBadge = '<span class="status-badge status-cancelled">Cancelled</span>';
                else if (status === 'completed') statusBadge = '<span class="status-badge status-completed">Completed</span>';
                
                return `
                    <div class="glass history-card p-5">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h3 class="font-bold text-lg text-white mb-2">${propTitle}</h3>
                                <p class="text-gray-400 text-sm">📅 ${checkIn} → ${checkOut}</p>
                                <p class="text-gray-400 text-sm">💵 KSh ${totalPrice.toLocaleString()}</p>
                            </div>
                            <div class="flex flex-col items-end gap-2">
                                ${statusBadge}
                                <button onclick="viewBookingDetails('${booking.id}')" class="text-purple-400 hover:text-purple-300 text-sm">View Details →</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterHistory(filter) {
            currentFilter = filter;
            
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + filter).classList.add('active');
            
            displayBookings();
        }

        function viewBookingDetails(bookingId) {
            window.location.href = 'bookings.html?id=' + bookingId;
        }
    </script>
</body>
</html>
