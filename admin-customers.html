<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Customers Management - ViewOnce Airbnb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <script src="store.js"></script>
    <script src="api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #FF5A5F; --secondary: #484848; --accent: #00A699; --success: #10B981; --warning: #F59E0B; --error: #EF4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #F7F7F7; color: #222; }
        .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 280px; transform: translateX(-100%); transition: transform 0.3s; z-index: 1000; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); border-radius: 0 24px 24px 0; }
        .sidebar.active { transform: translateX(0); }
        .sidebar-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: all 0.3s; z-index: 999; }
        .sidebar-backdrop.active { opacity: 1; visibility: visible; }
        .sidebar-item { display: block; width: 100%; padding: 12px 16px; margin: 4px 0; background: transparent; border: none; color: white; text-align: left; cursor: pointer; font-weight: 500; font-size: 14px; border-radius: 12px; transition: all 0.3s; }
        .sidebar-item:hover { background: rgba(255, 90, 95, 0.15); padding-left: 20px; color: #FF5A5F; }
        .header { background: white; padding: 16px 24px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .glass { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { background: #e8484c; }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-badge.success { background: #D1FAE5; color: #065F46; }
        .status-badge.warning { background: #FEF3C7; color: #92400E; }
        .status-badge.error { background: #FEE2E2; color: #991B1B; }
        .status-badge.info { background: #DBEAFE; color: #1E40AF; }
        .data-row { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid #eee; }
        .data-row:hover { background: #f9f9f9; }
        .loading-spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <button onclick="closeSidebar()" title="Close sidebar" style="position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;color:white;font-size:18px;cursor:pointer;">×</button>
        <div style="padding: 80px 16px 20px;">
            <h2 class="font-bold text-lg text-white mb-4"><i class="fas fa-shield-alt mr-2"></i>Admin Panel</h2>
            <button onclick="window.location.href='admin-dashboard.html'" title="Go to Dashboard" class="sidebar-item"><i class="fas fa-home mr-2 w-6"></i>Dashboard</button>
            <button onclick="window.location.href='admin-payments.html'" title="Go to Payments" class="sidebar-item"><i class="fas fa-credit-card mr-2 w-6"></i>Payments</button>
            <button onclick="window.location.href='admin-bookings.html'" title="Go to Bookings" class="sidebar-item"><i class="fas fa-calendar-check mr-2 w-6"></i>Bookings</button>
            <button onclick="window.location.href='admin-customers.html'" title="Go to Customers" class="sidebar-item" style="background:rgba(255,90,95,0.2);"><i class="fas fa-users mr-2 w-6"></i>Customers</button>
            <button onclick="window.location.href='admin-properties.html'" title="Go to Properties" class="sidebar-item"><i class="fas fa-building mr-2 w-6"></i>Properties</button>
            <button onclick="logout()" title="Logout from admin panel" class="sidebar-item" style="background:rgba(239,68,68,0.3);margin-top:20px;"><i class="fas fa-sign-out-alt mr-2 w-6"></i>Logout</button>
        </div>
    </div>
    <div id="sidebarBackdrop" onclick="closeSidebar()" class="sidebar-backdrop"></div>

    <!-- Header -->
    <header class="header">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" style="background:#f1f1f1;border:none;padding:10px 16px;border-radius:12px;cursor:pointer;"><i class="fas fa-bars"></i></button>
            <h1 class="font-bold text-xl"><i class="fas fa-users text-pink-500 mr-2"></i>Customers Management</h1>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-sm text-gray-500" id="adminName">Admin User</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-20 px-6 pb-6" style="max-width: 1400px; margin: 0 auto;">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
            <div class="glass p-6">
                <p class="text-gray-500 text-sm">Total Customers</p>
                <p class="text-3xl font-bold" id="totalCustomers">0</p>
            </div>
            <div class="glass p-6">
                <p class="text-gray-500 text-sm">Active</p>
                <p class="text-3xl font-bold text-green-600" id="activeCustomers">0</p>
            </div>
            <div class="glass p-6">
                <p class="text-gray-500 text-sm">New This Month</p>
                <p class="text-3xl font-bold text-blue-600" id="newCustomers">0</p>
            </div>
            <div class="glass p-6">
                <p class="text-gray-500 text-sm">Total Bookings</p>
                <p class="text-3xl font-bold" id="totalBookings">0</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="glass p-6 mb-6">
            <div class="flex flex-wrap gap-4">
                <select id="statusFilter" class="input-field" style="width:auto;" onchange="filterCustomers()">
                    <option value="all">All Status</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                    <option value="suspended">Suspended</option>
                </select>
                <input type="text" id="searchInput" placeholder="Search by name or email..." class="input-field" style="width:300px;" onkeyup="searchCustomers()">
            </div>
        </div>

        <!-- Customers List -->
        <div class="glass p-6">
            <h3 class="font-bold text-lg mb-4">All Customers</h3>
            <div id="customersList">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </main>

    <script>
        let customers = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadCustomers();
        });

        function loadCustomers() {
            // Demo data
            customers = [
                { id: 'C001', name: 'John Doe', email: 'john@example.com', phone: '+254700000001', status: 'active', bookings: 5, totalSpent: 125000, joinedDate: '2023-06-15', verified: true },
                { id: 'C002', name: 'Jane Smith', email: 'jane@example.com', phone: '+254700000002', status: 'active', bookings: 3, totalSpent: 54000, joinedDate: '2023-08-20', verified: true },
                { id: 'C003', name: 'Mike Johnson', email: 'mike@example.com', phone: '+254700000003', status: 'active', bookings: 8, totalSpent: 240000, joinedDate: '2023-03-10', verified: true },
                { id: 'C004', name: 'Emily Brown', email: 'emily@example.com', phone: '+254700000004', status: 'inactive', bookings: 1, totalSpent: 15000, joinedDate: '2023-11-05', verified: false },
                { id: 'C005', name: 'David Wilson', email: 'david@example.com', phone: '+254700000005', status: 'active', bookings: 12, totalSpent: 360000, joinedDate: '2023-01-20', verified: true },
                { id: 'C006', name: 'Sarah Davis', email: 'sarah@example.com', phone: '+254700000006', status: 'suspended', bookings: 0, totalSpent: 0, joinedDate: '2023-12-01', verified: false }
            ];
            renderCustomers(customers);
            updateStats();
        }

        function renderCustomers(customerList) {
            const container = document.getElementById('customersList');
            if (!customerList || customerList.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">No customers found</p>';
                return;
            }
            container.innerHTML = customerList.map(c => `
                <div class="data-row">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full flex items-center justify-center bg-blue-100">
                            <i class="fas fa-user text-blue-500"></i>
                        </div>
                        <div>
                            <p class="font-bold">${c.name}</p>
                            <p class="text-sm text-gray-500">${c.email}</p>
                            <p class="text-xs text-gray-400">${c.phone}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="status-badge ${c.status === 'active' ? 'success' : c.status === 'inactive' ? 'warning' : 'error'}">${c.status}</span>
                        <p class="text-sm text-gray-500 mt-1">Joined: ${c.joinedDate}</p>
                        <p class="text-xs text-gray-400">${c.verified ? '<i class="fas fa-check-circle text-green-500"></i> Verified' : '<i class="fas fa-times-circle text-red-500"></i> Unverified'}</p>
                    </div>
                    <div class="text-right ml-4">
                        <p class="font-bold">${c.bookings} bookings</p>
                        <p class="text-sm text-gray-500">KSh ${c.totalSpent.toLocaleString()} total</p>
                    </div>
                    <div class="flex gap-2 ml-4">
                        <button onclick="viewCustomerDetail('${c.id}')" class="btn-primary"><i class="fas fa-eye"></i> View</button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalCustomers').textContent = customers.length;
            document.getElementById('activeCustomers').textContent = customers.filter(c => c.status === 'active').length;
            document.getElementById('newCustomers').textContent = customers.filter(c => c.joinedDate >= '2023-12-01').length;
            document.getElementById('totalBookings').textContent = customers.reduce((sum, c) => sum + c.bookings, 0);
        }

        function filterCustomers() {
            const status = document.getElementById('statusFilter').value;
            if (status === 'all') {
                renderCustomers(customers);
            } else {
                renderCustomers(customers.filter(c => c.status === status));
            }
        }

        function searchCustomers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = customers.filter(c => 
                c.name.toLowerCase().includes(search) || 
                c.email.toLowerCase().includes(search)
            );
            renderCustomers(filtered);
        }

        function viewCustomerDetail(customerId) {
            const customer = customers.find(c => c.id === customerId);
            if (!customer) return;
            alert(`Customer Details:\n\nName: ${customer.name}\nEmail: ${customer.email}\nPhone: ${customer.phone}\nStatus: ${customer.status}\nBookings: ${customer.bookings}\nTotal Spent: KSh ${customer.totalSpent.toLocaleString()}\nJoined: ${customer.joinedDate}\nVerified: ${customer.verified ? 'Yes' : 'No'}`);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('sidebarBackdrop').classList.add('active');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('sidebarBackdrop').classList.remove('active');
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'welcome.html';
        }
    </script>
</body>
</html>
