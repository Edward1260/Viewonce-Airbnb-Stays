<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Platform Master Hub</title>
    <script src="api.js"></script>
    <script src="router.js"></script>
    <script src="store.js"></script>
    <script src="admin-functions.js"></script>
    <style>
        /* Loading styles */
        :root {
            --bg: #0a0a1a;
            --panel-solid: rgba(20, 20, 40, 0.95);
            --border: rgba(255, 255, 255, 0.25);
            --accent: linear-gradient(135deg, #667eea, #764ba2);
            --gold: #D4AF37;
            --text: #ffffff;
            --error: #ff6b6b;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-container {
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
        }

        .error-container {
            text-align: center;
            padding: 40px;
            background: var(--panel-solid);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 400px;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--error);
        }

        .error-message {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-container">
            <div class="spinner"></div>
            <div class="loading-text">Verifying access...</div>
        </div>
    </div>

    <script>
        // Check authentication and load dashboard
        async function checkAuth() {
            const app = document.getElementById('app');
            
            // Try to get token from localStorage or sessionStorage
            let token = localStorage.getItem('token') || sessionStorage.getItem('token');
            let user = localStorage.getItem('user') || sessionStorage.getItem('user');
            
            if (!token || !user) {
                // Not logged in, redirect to login
                window.location.href = 'login.html?message=' + encodeURIComponent('Please login to access the dashboard');
                return;
            }
            
            try {
                // Parse user data
                user = JSON.parse(user);
                
                // Check if user is super_admin
                if (user.role !== 'super_admin') {
                    // Not authorized, show error
                    app.innerHTML = `
                        <div class="error-container">
                            <div class="error-icon">🚫</div>
                            <div class="error-title">Access Denied</div>
                            <div class="error-message">You don't have permission to access this dashboard. Only super admins can access this page.</div>
                            <a href="login.html" class="btn">Login as Super Admin</a>
                        </div>
                    `;
                    return;
                }
                
                // User is authorized, load the dashboard
                // Load the main dashboard content
                loadDashboard();
                
            } catch (e) {
                console.error('Auth check error:', e);
                // Invalid data, redirect to login
                window.location.href = 'login.html?message=' + encodeURIComponent('Session expired. Please login again.');
            }
        }

        // Load dashboard content
        async function loadDashboard() {
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <div class="loading-container">
                    <div class="spinner"></div>
                    <div class="loading-text">Loading dashboard...</div>
                </div>
            `;
            
            try {
                // Fetch the main dashboard HTML
                const response = await fetch('../platform-master-hub-fixed.html');
                const html = await response.text();
                
                // Create a container for the dashboard
                const container = document.createElement('div');
                container.style.width = '100%';
                container.style.minHeight = '100vh';
                container.innerHTML = html;
                
                // Replace the app content
                app.innerHTML = '';
                app.appendChild(container);
                
                // Initialize dashboard scripts if needed
                if (typeof window.initDashboard === 'function') {
                    window.initDashboard();
                }
                
            } catch (e) {
                console.error('Error loading dashboard:', e);
                app.innerHTML = `
                    <div class="error-container">
                        <div class="error-icon">⚠️</div>
                        <div class="error-title">Error Loading Dashboard</div>
                        <div class="error-message">There was an error loading the dashboard. Please try again.</div>
                        <button onclick="loadDashboard()" class="btn">Retry</button>
                    </div>
                `;
            }
        }

        // Check authentication on page load
        checkAuth();
    </script>
</body>
</html>
