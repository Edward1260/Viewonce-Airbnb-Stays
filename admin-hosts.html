<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViewOnce - Host Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <script src="api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .sidebar { position: fixed; left: 0; top: 0; height: 100%; width: 280px; background: #020617; padding: 24px; border-right: 1px solid rgba(139, 92, 246, 0.3); }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 14px 18px; color: rgba(255,255,255,0.7); border-radius: 14px; margin-bottom: 8px; transition: 0.3s; width: 100%; text-align: left; }
        .sidebar-item:hover, .sidebar-item.active { background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; }
        .main-content { margin-left: 280px; padding: 40px; }
        .btn-gradient { background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; padding: 12px 24px; border-radius: 12px; font-weight: 600; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-badge.active { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-badge.pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 16px; text-align: left; font-size: 12px; text-transform: uppercase; color: rgba(255,255,255,0.5); }
        td { padding: 16px; background: rgba(255,255,255,0.03); }
        tr td:first-child { border-radius: 12px 0 0 12px; }
        tr td:last-child { border-radius: 0 12px 12px 0; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="mb-10 text-2xl font-bold bg-gradient-to-r from-purple-400 to-cyan-400 bg-clip-text text-transparent">ViewOnce Admin</div>
        <nav>
            <button class="sidebar-item" onclick="window.location.href='admin-dashboard.html'"><i class="fas fa-th-large"></i> Dashboard</button>
            <button class="sidebar-item active"><i class="fas fa-home"></i> Hosts</button>
            <button class="sidebar-item" onclick="window.location.href='admin-customers.html'"><i class="fas fa-users"></i> Customers</button>
            <button class="sidebar-item" onclick="window.location.href='admin-properties.html'"><i class="fas fa-building"></i> Properties</button>
            <button class="sidebar-item" onclick="window.location.href='admin-bookings.html'"><i class="fas fa-calendar-check"></i> Bookings</button>
        </nav>
    </aside>

    <main class="main-content">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold">Host Management</h1>
            <div class="flex gap-4">
                <input type="text" id="hostSearch" placeholder="Search hosts..." class="bg-white/10 border border-white/20 rounded-xl px-4 py-2 text-white">
                <button class="btn-gradient" onclick="openInviteHostModal()">Invite Host</button>
            </div>
        </div>

        <div class="glass-card p-6">
            <table>
                <thead>
                    <tr>
                        <th>Host Details</th>
                        <th>Email</th>
                        <th>Properties</th>
                        <th>Revenue</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="hostTableBody">
                    <tr><td colspan="6" class="text-center py-10"><i class="fas fa-spinner fa-spin mr-2"></i>Loading hosts...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', loadHosts);

        async function loadHosts() {
            const tbody = document.getElementById('hostTableBody');
            try {
                const hosts = await window.api.getUsers('host');
                const hostList = Array.isArray(hosts) ? hosts : (hosts.data || []);

                if (hostList.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10">No hosts found.</td></tr>';
                    return;
                }

                tbody.innerHTML = hostList.map(host => `
                    <tr>
                        <td>
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center font-bold text-purple-400">
                                    ${host.full_name?.charAt(0) || 'H'}
                                </div>
                                <div>
                                    <div class="font-semibold">${host.full_name || 'Unknown'}</div>
                                    <div class="text-xs text-white/40">${host.id.substring(0,8)}</div>
                                </div>
                            </div>
                        </td>
                        <td>${host.email}</td>
                        <td>${host.property_count || 0}</td>
                        <td class="font-bold text-green-400">KSh ${parseInt(host.total_revenue || 0).toLocaleString()}</td>
                        <td><span class="status-badge ${host.is_active ? 'active' : 'pending'}">${host.is_active ? 'Active' : 'Pending'}</span></td>
                        <td>
                            <button class="text-purple-400 hover:text-white transition" onclick="viewHost('${host.id}')"><i class="fas fa-eye"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Failed to load hosts:', error);
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-red-400">Error loading data.</td></tr>';
            }
        }

        function viewHost(id) {
            sessionStorage.setItem('viewingHostId', id);
            // window.location.href = 'admin-host-details.html';
            alert('Viewing host details for: ' + id);
        }

        function openInviteHostModal() {
            // Direct access to modal logic if needed, or redirect back to main dashboard
            // For now, redirect to dashboard which has the full modal implementation
            window.location.href = 'admin-dashboard.html?action=invite';
        }
    </script>
</body>
</html>
