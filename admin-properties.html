<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Properties Management - ViewOnce Airbnb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <script src="store.js"></script>
    <script src="api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #FF5A5F; --secondary: #484848; --accent: #00A699; --success: #10B981; --warning: #F59E0B; --error: #EF4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #F7F7F7; color: #222; }
        .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 280px; transform: translateX(-100%); transition: transform 0.3s; z-index: 1000; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); border-radius: 0 24px 24px 0; }
        .sidebar.active { transform: translateX(0); }
        .sidebar-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: all 0.3s; z-index: 999; }
        .sidebar-backdrop.active { opacity: 1; visibility: visible; }
        .sidebar-item { display: block; width: 100%; padding: 12px 16px; margin: 4px 0; background: transparent; border: none; color: white; text-align: left; cursor: pointer; font-weight: 500; font-size: 14px; border-radius: 12px; transition: all 0.3s; }
        .sidebar-item:hover { background: rgba(255, 90, 95, 0.15); padding-left: 20px; color: #FF5A5F; }
        .header { background: white; padding: 16px 24px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .glass { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { background: #e8484c; }
        .btn-success { background: var(--success); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-badge.success { background: #D1FAE5; color: #065F46; }
        .status-badge.warning { background: #FEF3C7; color: #92400E; }
        .status-badge.error { background: #FEE2E2; color: #991B1B; }
        .status-badge.info { background: #DBEAFE; color: #1E40AF; }
        .data-row { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid #eee; }
        .data-row:hover { background: #f9f9f9; }
        .property-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .property-image { width: 100%; height: 200px; object-fit: cover; }
        .loading-spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <button onclick="closeSidebar()" title="Close sidebar" style="position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;color:white;font-size:18px;cursor:pointer;">×</button>
        <div style="padding: 80px 16px 20px;">
            <h2 class="font-bold text-lg text-white mb-4"><i class="fas fa-shield-alt mr-2"></i>Admin Panel</h2>
            <button onclick="window.location.href='admin-dashboard.html'" title="Go to Dashboard" class="sidebar-item"><i class="fas fa-home mr-2 w-6"></i>Dashboard</button>
            <button onclick="window.location.href='admin-payments.html'" title="Go to Payments" class="sidebar-item"><i class="fas fa-credit-card mr-2 w-6"></i>Payments</button>
            <button onclick="window.location.href='admin-bookings.html'" title="Go to Bookings" class="sidebar-item"><i class="fas fa-calendar-check mr-2 w-6"></i>Bookings</button>
            <button onclick="window.location.href='customer-dashboard.html'" title="Go to Customers" class="sidebar-item"><i class="fas fa-users mr-2 w-6"></i>Customers</button>
            <button onclick="window.location.href='admin-properties.html'" title="Go to Properties" class="sidebar-item" style="background:rgba(255,90,95,0.2);"><i class="fas fa-building mr-2 w-6"></i>Properties</button>
            <button onclick="logout()" title="Logout from admin panel" class="sidebar-item" style="background:rgba(239,68,68,0.3);margin-top:20px;"><i class="fas fa-sign-out-alt mr-2 w-6"></i>Logout</button>
        </div>
    </div>
    <div id="sidebarBackdrop" onclick="closeSidebar()" class="sidebar-backdrop"></div>

    <!-- Header -->
    <header class="header">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" style="background:#f1f1f1;border:none;padding:10px 16px;border-radius:12px;cursor:pointer;"><i class="fas fa-bars"></i></button>
            <h1 class="font-bold text-xl"><i class="fas fa-building text-pink-500 mr-2"></i>Properties Management</h1>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-sm text-gray-500" id="adminName">Admin User</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-20 px-6 pb-6" style="max-width: 1400px; margin: 0 auto;">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
            <div class="glass p-6">
                <p class="text-gray-500 text-sm">Total Properties</p>
                <p class="text-3xl font-bold" id="totalProperties">0</p>
            </div>
            <div class="glass p-6">
                <p class="text-gray-500 text-sm">Active</p>
                <p class="text-3xl font-bold text-green-600" id="activeProperties">0</p>
            </div>
            <div class="glass p-6">
                <p class="text-gray-500 text-sm">Pending Approval</p>
                <p class="text-3xl font-bold text-yellow-600" id="pendingProperties">0</p>
            </div>
            <div class="glass p-6">
                <p class="text-gray-500 text-sm">Total Revenue</p>
                <p class="text-3xl font-bold" id="totalRevenue">KSh 0</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="glass p-6 mb-6">
            <div class="flex flex-wrap gap-4">
                <select id="statusFilter" class="input-field" style="width:auto;" onchange="filterProperties()">
                    <option value="all">All Status</option>
                    <option value="active">Active</option>
                    <option value="pending">Pending</option>
                    <option value="inactive">Inactive</option>
                </select>
                <select id="typeFilter" class="input-field" style="width:auto;" onchange="filterProperties()">
                    <option value="all">All Types</option>
                    <option value="house">House</option>
                    <option value="apartment">Apartment</option>
                    <option value="villa">Villa</option>
                    <option value="studio">Studio</option>
                </select>
            </div>
        </div>

        <!-- Properties List -->
        <div class="glass p-6">
            <h3 class="font-bold text-lg mb-4">All Properties</h3>
            <div id="propertiesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </main>

    <script>
        let properties = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadProperties();
        });

        function loadProperties() {
            // Demo data
            properties = [
                { id: 'P001', name: 'Luxury Villa in Karen', type: 'villa', address: 'Karen, Nairobi', host: 'Host David', hostEmail: 'david@example.com', hostPhone: '+254700000010', price: 25000, status: 'active', bookings: 12, revenue: 300000 },
                { id: 'P002', name: 'Modern Apartment CBD', type: 'apartment', address: 'CBD, Nairobi', host: 'Host Sarah', hostEmail: 'sarah@example.com', hostPhone: '+254700000011', price: 18000, status: 'active', bookings: 8, revenue: 144000 },
                { id: 'P003', name: 'Cozy Studio Westlands', type: 'studio', address: 'Westlands, Nairobi', host: 'Host Mike', hostEmail: 'mike@example.com', hostPhone: '+254700000012', price: 12000, status: 'active', bookings: 15, revenue: 180000 },
                { id: 'P004', name: 'Beach House Malindi', type: 'house', address: 'Malindi, Kenya', host: 'Host David', hostEmail: 'david@example.com', hostPhone: '+254700000010', price: 45000, status: 'pending', bookings: 0, revenue: 0 },
                { id: 'P005', name: 'Mountain View Lodge', type: 'house', address: 'Naivasha, Kenya', host: 'Host Sarah', hostEmail: 'sarah@example.com', hostPhone: '+254700000011', price: 35000, status: 'active', bookings: 6, revenue: 210000 },
                { id: 'P006', name: 'City Center Loft', type: 'apartment', address: 'CBD, Nairobi', host: 'Host Mike', hostEmail: 'mike@example.com', hostPhone: '+254700000012', price: 22000, status: 'inactive', bookings: 0, revenue: 0 }
            ];
            renderProperties(properties);
            updateStats();
        }

        function renderProperties(propertyList) {
            const container = document.getElementById('propertiesList');
            if (!propertyList || propertyList.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8 col-span-3">No properties found</p>';
                return;
            }
            container.innerHTML = propertyList.map(p => `
                <div class="property-card">
                    <div class="h-48 bg-gradient-to-br from-pink-400 to-purple-500 flex items-center justify-center">
                        <i class="fas fa-home text-white text-4xl"></i>
                    </div>
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-lg">${p.name}</h4>
                            <span class="status-badge ${p.status === 'active' ? 'success' : p.status === 'pending' ? 'warning' : 'error'}">${p.status}</span>
                        </div>
                        <p class="text-sm text-gray-500 mb-2"><i class="fas fa-map-marker-alt mr-1"></i>${p.address}</p>
                        <p class="text-sm text-gray-500 mb-2"><i class="fas fa-user mr-1"></i>${p.host}</p>
                        <p class="text-sm text-gray-500 mb-2"><i class="fas fa-envelope mr-1"></i>${p.hostEmail}</p>
                        <div class="flex justify-between items-center mt-4 pt-4 border-t">
                            <p class="font-bold text-lg">KSh ${p.price.toLocaleString()}<span class="text-sm text-gray-500">/night</span></p>
                            <p class="text-sm text-gray-500">${p.bookings} bookings</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalProperties').textContent = properties.length;
            document.getElementById('activeProperties').textContent = properties.filter(p => p.status === 'active').length;
            document.getElementById('pendingProperties').textContent = properties.filter(p => p.status === 'pending').length;
            const totalRevenue = properties.reduce((sum, p) => sum + (p.revenue || 0), 0);
            document.getElementById('totalRevenue').textContent = 'KSh ' + totalRevenue.toLocaleString();
        }

        function filterProperties() {
            const status = document.getElementById('statusFilter').value;
            const type = document.getElementById('typeFilter').value;
            let filtered = properties;
            if (status !== 'all') filtered = filtered.filter(p => p.status === status);
            if (type !== 'all') filtered = filtered.filter(p => p.type === type);
            renderProperties(filtered);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('sidebarBackdrop').classList.add('active');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('sidebarBackdrop').classList.remove('active');
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'welcome.html';
        }
    </script>
</body>
</html>
