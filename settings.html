<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Airbnb Customer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="store.js"></script>
    <script src="api.js"></script>
    <script src="router.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --glass-bg: rgba(255, 255, 255, 0.15); --glass-border: rgba(255, 255, 255, 0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #667eea, #764ba2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); }
        .glass-hover { transition: all 0.3s ease; }
        .glass-hover:hover { background: rgba(255, 255, 255, 0.25); }
        .btn-neon { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 50px; padding: 12px 28px; font-weight: 600; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); transition: all 0.3s ease; }
        .btn-neon:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6); }
        .btn-gradient { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; border-radius: 16px; padding: 12px 24px; font-weight: 600; transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-3px); }
        header { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .toggle-switch { position: relative; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; inset: 0; background-color: rgba(255,255,255,0.3); border-radius: 34px; transition: 0.3s; }
        .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: 0.3s; }
        input:checked + .toggle-slider { background: linear-gradient(135deg, #667eea, #764ba2); }
        input:checked + .toggle-slider:before { transform: translateX(24px); }
        .select-field { background: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 12px; padding: 14px 16px; color: white; outline: none; width: 100%; }
        .select-field option { color: #1e293b; }
    </style>
</head>
<body class="min-h-screen">
    <header class="w-full flex items-center justify-between px-6 py-4 glass fixed top-0 z-50">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='customer-dashboard.html'" class="text-white hover:text-gray-200 font-medium transition">← Back to Dashboard</button>
            <h1 class="font-bold text-xl text-white drop-shadow-lg">Settings</h1>
        </div>
    </header>

    <div class="max-w-4xl mx-auto pt-24 px-6 pb-12">
        <div class="glass p-8">
            <h2 class="text-3xl font-bold text-white mb-6">Account Settings</h2>
            
            <div class="space-y-8">
                <!-- Notifications Section -->
                <div class="glass p-6">
                    <h3 class="text-xl font-semibold text-white mb-4">🔔 Notifications</h3>
                    <div class="space-y-4">
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-white">Email notifications for bookings</span>
                            <div class="toggle-switch"><input type="checkbox" checked><span class="toggle-slider"></span></div>
                        </label>
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-white">Push notifications for messages</span>
                            <div class="toggle-switch"><input type="checkbox" checked><span class="toggle-slider"></span></div>
                        </label>
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-white">Marketing emails</span>
                            <div class="toggle-switch"><input type="checkbox"><span class="toggle-slider"></span></div>
                        </label>
                    </div>
                </div>

                <!-- Privacy Section -->
                <div class="glass p-6">
                    <h3 class="text-xl font-semibold text-white mb-4">🔒 Privacy</h3>
                    <div class="space-y-4">
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-white">Show my profile to other users</span>
                            <div class="toggle-switch"><input type="checkbox" checked><span class="toggle-slider"></span></div>
                        </label>
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-white">Allow hosts to contact me directly</span>
                            <div class="toggle-switch"><input type="checkbox"><span class="toggle-slider"></span></div>
                        </label>
                    </div>
                </div>

                <!-- Language & Currency -->
                <div class="glass p-6">
                    <h3 class="text-xl font-semibold text-white mb-4">🌐 Language & Currency</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-white mb-2">Language</label>
                            <select class="select-field">
                                <option>English</option>
                                <option>Swahili</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-white mb-2">Currency</label>
                            <select class="select-field">
                                <option>KES - Kenyan Shilling</option>
                                <option>USD - US Dollar</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Account Actions -->
                <div class="glass p-6">
                    <h3 class="text-xl font-semibold text-white mb-4">⚙️ Account Actions</h3>
                    <div class="flex flex-wrap gap-4">
                        <button onclick="changePassword()" class="btn-neon">Change Password</button>
                        <button onclick="deleteAccount()" class="btn-gradient bg-red-500">Delete Account</button>
                    </div>
                </div>
            </div>

            <div class="mt-8 flex gap-4">
                <button onclick="saveSettings()" class="btn-neon">Save Settings</button>
                <button onclick="resetSettings()" class="px-6 py-2 bg-gray-500 text-white rounded-xl hover:bg-gray-600 transition">Reset to Default</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!isLoggedIn || user.role !== 'customer') {
                window.location.href = 'login-signup.html';
            }
        });

        function saveSettings() { alert('Settings saved successfully!'); }
        function resetSettings() { if (confirm('Reset all settings to default?')) alert('Settings reset to default.'); }
        function changePassword() { alert('Password change feature - Redirecting to profile page'); window.location.href = 'profile.html'; }
        function deleteAccount() { if (confirm('Are you sure you want to delete your account? This cannot be undone.')) alert('Account deletion requested.'); }
    </script>
</body>
</html>
