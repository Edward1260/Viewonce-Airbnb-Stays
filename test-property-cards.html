<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Property Card Functionality</title>
    <link href="styles.css" rel="stylesheet">
    <style>
        body { background: #F2FD7D; font-family: 'Poppins', sans-serif; }
        .glass { backdrop-filter: blur(14px); background: rgba(255,255,255,0.15); }
        .card-3d:hover { transform: perspective(900px) rotateX(6deg) rotateY(-6deg) scale(1.03); transition: 0.4s ease; }
        .property-card img { height: 180px; width: 100%; object-fit: cover; border-radius: 1rem; }
    </style>
</head>
<body class="p-8">
    <h1 class="text-3xl font-bold mb-6">Property Card Functionality Test</h1>

    <!-- Test Property Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="propertyGrid">
        <!-- Property Cards will be loaded here -->
    </div>

    <!-- Edit Property Modal -->
    <div id="editPropertyModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[1200] hidden">
        <div class="glass p-6 rounded-2xl w-[600px] max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-2xl">Edit Property</h2>
                <button onclick="closeEditPropertyModal()" class="text-2xl">✖</button>
            </div>
            <form id="editPropertyForm" class="space-y-4">
                <div class="flex items-center gap-4 mb-4">
                    <img id="editPropertyImage" src="/images/placeholder-property.jpg" alt="Property" class="w-20 h-20 rounded-xl object-cover">
                    <div>
                        <h3 id="editPropertyTitle" class="font-bold text-lg"></h3>
                        <p id="editPropertyRating" class="text-sm text-gray-600"></p>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Property Title</label>
                    <input type="text" id="editPropTitle" class="w-full glass p-3 rounded-xl" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Description</label>
                    <textarea id="editPropDescription" class="w-full glass p-3 rounded-xl" rows="3" placeholder="Describe your property..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Max Guests</label>
                        <input type="number" id="editPropGuests" class="w-full glass p-3 rounded-xl" min="1" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Bedrooms</label>
                        <input type="number" id="editPropBedrooms" class="w-full glass p-3 rounded-xl" min="0" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Amenities</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" id="editWifi" class="rounded"> WiFi
                        </label>
                        <label class="flex items-center gap-2">
                            <input type="checkbox" id="editPool" class="rounded"> Pool
                        </label>
                        <label class="flex items-center gap-2">
                            <input type="checkbox" id="editParking" class="rounded"> Parking
                        </label>
                        <label class="flex items-center gap-2">
                            <input type="checkbox" id="editKitchen" class="rounded"> Kitchen
                        </label>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button type="submit" class="bg-[#6DC839] text-white px-6 py-2 rounded-xl hover:bg-[#5BB829] transition-colors">Save Changes</button>
                    <button type="button" onclick="closeEditPropertyModal()" class="glass px-6 py-2 rounded-xl">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Update Pricing Modal -->
    <div id="updatePricingModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[1200] hidden">
        <div class="glass p-6 rounded-2xl w-[500px]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-2xl">Update Pricing</h2>
                <button onclick="closeUpdatePricingModal()" class="text-2xl">✖</button>
            </div>
            <form id="updatePricingForm" class="space-y-4">
                <div class="flex items-center gap-4 mb-4">
                    <img id="pricingPropertyImage" src="/images/placeholder-property.jpg" alt="Property" class="w-16 h-16 rounded-xl object-cover">
                    <div>
                        <h3 id="pricingPropertyTitle" class="font-bold text-lg"></h3>
                        <p class="text-sm text-gray-600">Current: Ksh <span id="currentPrice"></span> / night</p>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">New Price per Night (Ksh)</label>
                    <input type="number" id="newPrice" class="w-full glass p-3 rounded-xl" min="100" required>
                </div>
                <div class="bg-yellow-50 p-3 rounded-xl">
                    <p class="text-sm text-yellow-800">
                        <strong>Market Insight:</strong> Similar properties in this area average Ksh 8,500/night.
                        Consider seasonal pricing for better occupancy.
                    </p>
                </div>
                <div class="flex gap-3">
                    <button type="submit" class="bg-[#6DC839] text-white px-6 py-2 rounded-xl hover:bg-[#5BB829] transition-colors">Update Price</button>
                    <button type="button" onclick="closeUpdatePricingModal()" class="glass px-6 py-2 rounded-xl">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- View Bookings Modal -->
    <div id="viewBookingsModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[1200] hidden">
        <div class="glass p-6 rounded-2xl w-[700px] max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-2xl">Property Bookings</h2>
                <button onclick="closeViewBookingsModal()" class="text-2xl">✖</button>
            </div>
            <div class="mb-4">
                <h3 id="bookingsPropertyTitle" class="font-bold text-xl"></h3>
                <p class="text-sm text-gray-600">Recent and upcoming bookings</p>
            </div>
            <div id="bookingsList" class="space-y-4">
                <!-- Bookings will be loaded here -->
            </div>
            <div class="mt-6 flex gap-3">
                <button onclick="closeViewBookingsModal()" class="glass px-6 py-2 rounded-xl">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Test properties data
        const properties = [
            {title:'Nairobi Luxury Loft', rating:4.8, price:6400, status:'active', images:['/images/placeholder-property.jpg"relative">
                    <img src="${prop.images[0]}" class="carousel-img active">
                </div>
                <h3 class="font-bold text-lg mt-2">${prop.title}</h3>
                <p class="text-sm opacity-70">⭐ ${prop.rating} • Ksh ${prop.price} / night</p>
                <p class="text-xs text-gray-500">Status: ${prop.status}</p>
                <div class="flex gap-2 mt-2">
                    <button class="edit-btn glass px-3 py-1 rounded-xl text-sm" data-index="${index}">Edit</button>
                    <button class="pricing-btn glass px-3 py-1 rounded-xl text-sm" data-index="${index}">Update Pricing</button>
                    <button class="bookings-btn glass px-3 py-1 rounded-xl text-sm" data-index="${index}">View Bookings</button>
                    <button class="pause-btn glass px-3 py-1 rounded-xl text-sm" data-index="${index}">${prop.status === 'active' ? 'Pause Listing' : 'Resume Listing'}</button>
                </div>
            `;
            propertyGrid.appendChild(card);
        });

        // Event listeners
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('edit-btn')) {
                const index = parseInt(e.target.getAttribute('data-index'));
                editProperty(index);
            } else if (e.target.classList.contains('pricing-btn')) {
                const index = parseInt(e.target.getAttribute('data-index'));
                updatePricing(index);
            } else if (e.target.classList.contains('bookings-btn')) {
                const index = parseInt(e.target.getAttribute('data-index'));
                viewBookings(index);
            } else if (e.target.classList.contains('pause-btn')) {
                const index = parseInt(e.target.getAttribute('data-index'));
                toggleListingStatus(index);
            }
        });

        // Modal functions
        function editProperty(index) {
            const property = properties[index];
            if (!property) return;

            document.getElementById('editPropertyImage').src = property.images[0];
            document.getElementById('editPropertyTitle').textContent = property.title;
            document.getElementById('editPropertyRating').textContent = `⭐ ${property.rating}`;
            document.getElementById('editPropTitle').value = property.title;
            document.getElementById('editPropDescription').value = property.description || '';
            document.getElementById('editPropGuests').value = property.guests || 1;
            document.getElementById('editPropBedrooms').value = property.bedrooms || 0;

            document.getElementById('editWifi').checked = property.amenities?.wifi || false;
            document.getElementById('editPool').checked = property.amenities?.pool || false;
            document.getElementById('editParking').checked = property.amenities?.parking || false;
            document.getElementById('editKitchen').checked = property.amenities?.kitchen || false;

            document.getElementById('editPropertyModal').classList.remove('hidden');
        }

        function closeEditPropertyModal() {
            document.getElementById('editPropertyModal').classList.add('hidden');
        }

        function updatePricing(index) {
            const property = properties[index];
            if (!property) return;

            document.getElementById('pricingPropertyImage').src = property.images[0];
            document.getElementById('pricingPropertyTitle').textContent = property.title;
            document.getElementById('currentPrice').textContent = property.price.toLocaleString();
            document.getElementById('newPrice').value = property.price;

            document.getElementById('updatePricingModal').classList.remove('hidden');
        }

        function closeUpdatePricingModal() {
            document.getElementById('updatePricingModal').classList.add('hidden');
        }

        function viewBookings(index) {
            const property = properties[index];
            if (!property) return;

            document.getElementById('bookingsPropertyTitle').textContent = property.title;

            // Mock data removed - use real API data
            const bookingsList = document.getElementById('bookingsList');
            bookingsList.innerHTML = '<p class="text-center text-gray-500">No bookings available</p>';

            document.getElementById('viewBookingsModal').classList.remove('hidden');
        }

        function closeViewBookingsModal() {
            document.getElementById('viewBookingsModal').classList.add('hidden');
        }

        function toggleListingStatus(index) {
            const property = properties[index];
            if (!property) return;

            property.status = property.status === 'active' ? 'paused' : 'active';

            const propertyCards = document.querySelectorAll('.property-card');
            const card = propertyCards[index];
            if (card) {
                const pauseBtn = card.querySelector('.pause-btn');
                if (pauseBtn) {
                    pauseBtn.textContent = property.status === 'active' ? 'Pause Listing' : 'Resume Listing';
                }
                const statusText = card.querySelector('p.text-xs');
                if (statusText) {
                    statusText.textContent = `Status: ${property.status}`;
                }
            }

            alert(`Property "${property.title}" has been ${property.status === 'active' ? 'activated' : 'paused'}.`);
        }

        // Form handlers
        document.getElementById('editPropertyForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const index = Array.from(document.querySelectorAll('.edit-btn')).find(btn =>
                btn === document.activeElement || btn.contains(document.activeElement)
            )?.getAttribute('data-index');

            if (index === undefined) return;

            const property = properties[index];
            if (!property) return;

            property.title = document.getElementById('editPropTitle').value;
            property.description = document.getElementById('editPropDescription').value;
            property.guests = parseInt(document.getElementById('editPropGuests').value);
            property.bedrooms = parseInt(document.getElementById('editPropBedrooms').value);
            property.amenities = {
                wifi: document.getElementById('editWifi').checked,
                pool: document.getElementById('editPool').checked,
                parking: document.getElementById('editParking').checked,
                kitchen: document.getElementById('editKitchen').checked
            };

            const propertyCards = document.querySelectorAll('.property-card');
            const card = propertyCards[index];
            if (card) {
                const titleElement = card.querySelector('h3');
                if (titleElement) {
                    titleElement.textContent = property.title;
                }
            }

            alert('Property updated successfully!');
            closeEditPropertyModal();
        });

        document.getElementById('updatePricingForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const index = Array.from(document.querySelectorAll('.pricing-btn')).find(btn =>
                btn === document.activeElement || btn.contains(document.activeElement)
            )?.getAttribute('data-index');

            if (index === undefined) return;

            const property = properties[index];
            if (!property) return;

            const newPrice = parseInt(document.getElementById('newPrice').value);
            if (newPrice < 100) {
                alert('Price must be at least Ksh 100.');
                return;
            }

            property.price = newPrice;

            const propertyCards = document.querySelectorAll('.property-card');
            const card = propertyCards[index];
            if (card) {
                const priceElement = card.querySelector('p.opacity-70');
                if (priceElement) {
                    priceElement.textContent = `⭐ ${property.rating} • Ksh ${property.price} / night`;
                }
            }

            alert(`Price updated to Ksh ${newPrice.toLocaleString()} per night!`);
            closeUpdatePricingModal();
        });

        // Test results
        console.log('Property Card Functionality Test Loaded');
        console.log('Properties:', properties);
    </link>
</body>
</html>
