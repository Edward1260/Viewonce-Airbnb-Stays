<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Airbnb Customer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config-fixed.js"></script>
    <script src="store.js"></script>
    <script src="api.js"></script>
    <script src="router.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #16213e 75%, #1a1a2e 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: #f3f4f6;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
        }
        
        .booking-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .booking-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(99, 102, 241, 0.5);
        }
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 600;
        }
        
        .modal-card {
            width: 90%;
            max-width: 600px;
            background: rgba(30, 30, 50, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        
        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }
        
        .tab-btn {
            padding: 10px 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #9ca3af;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab-btn:hover, .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .property-img {
            width: 150px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
        }
        
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .status-confirmed {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        
        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        
        .status-cancelled {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- HEADER -->
    <header class="w-full flex items-center justify-between px-6 py-4 glass fixed top-0 z-50">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='customer-dashboard.html'" class="text-white hover:text-purple-400 font-medium transition">← Back</button>
            <h1 class="font-bold text-xl text-white">My Bookings</h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="window.location.href='customer-dashboard.html'" class="btn btn-primary">Dashboard</button>
        </div>
    </header>

    <div class="max-w-6xl mx-auto pt-24 px-6 pb-8">
        <!-- Title -->
        <div class="mb-6">
            <h2 class="text-3xl font-bold text-white mb-2">Your Bookings</h2>
            <p class="text-white/60">Manage your reservations</p>
        </div>

        <!-- Filter Tabs -->
        <div class="flex gap-3 mb-6 flex-wrap">
            <button onclick="filterBookings('all')" id="tab-all" class="tab-btn active">All</button>
            <button onclick="filterBookings('upcoming')" id="tab-upcoming" class="tab-btn">Upcoming</button>
            <button onclick="filterBookings('past')" id="tab-past" class="tab-btn">Past</button>
            <button onclick="filterBookings('cancelled')" id="tab-cancelled" class="tab-btn">Cancelled</button>
        </div>

        <!-- Bookings Container -->
        <div id="bookingsContainer">
            <div class="glass p-8 text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-purple-500 border-t-transparent mx-auto"></div>
                <p class="mt-4 text-white/60">Loading your bookings...</p>
            </div>
        </div>
    </div>

    <!-- Booking Details Modal -->
    <div class="modal" id="bookingDetailsModal">
        <div class="modal-card">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white">Booking Details</h3>
                <button class="close-btn" onclick="closeBookingDetails()">×</button>
            </div>
            <div id="bookingDetailsContent"></div>
        </div>
    </div>

    <!-- Cancel Booking Modal -->
    <div class="modal" id="cancelBookingModal">
        <div class="modal-card">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-red-400">Cancel Booking</h3>
                <button class="close-btn" onclick="closeCancelModal()">×</button>
            </div>
            <div class="mb-4">
                <p class="text-white/80 mb-3">Are you sure you want to cancel this booking?</p>
                <div class="bg-yellow-500/20 p-4 rounded-xl border border-yellow-500/30">
                    <p class="text-yellow-400 text-sm"><strong>Note:</strong> Cancellation requests are subject to approval. Refunds are processed according to the property's cancellation policy.</p>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="confirmCancelBooking()" class="btn btn-danger flex-1">Confirm Cancellation</button>
                <button onclick="closeCancelModal()" class="btn bg-white/10 text-white flex-1">Keep Booking</button>
            </div>
        </div>
    </div>

    <script>
        let allBookings = [];
        let currentFilter = 'all';
        let currentCancelBookingId = null;

        // Check authentication
        document.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!isLoggedIn) {
                window.location.href = 'login-signup.html';
                return;
            }
            loadBookings();
        });

        async function loadBookings() {
            const container = document.getElementById('bookingsContainer');
            
            try {
                const bookings = await api.getBookings();
                allBookings = bookings || [];
                renderBookings();
            } catch (error) {
                console.error('Error loading bookings:', error);
                container.innerHTML = '<div class="glass p-8 text-center"><p class="text-red-400">Unable to load bookings. Please try again.</p></div>';
            }
        }

        function renderBookings() {
            const container = document.getElementById('bookingsContainer');
            
            let filteredBookings = allBookings;
            if (currentFilter === 'upcoming') {
                filteredBookings = allBookings.filter(b => b.status === 'confirmed' || b.status === 'pending');
            } else if (currentFilter === 'past') {
                filteredBookings = allBookings.filter(b => b.status === 'completed');
            } else if (currentFilter === 'cancelled') {
                filteredBookings = allBookings.filter(b => b.status === 'cancelled');
            }
            
            if (filteredBookings.length === 0) {
                container.innerHTML = '<div class="glass p-8 text-center"><p class="text-4xl mb-4">📅</p><p class="text-xl text-white/60 mb-4">No bookings found</p><button onclick="window.location.href=\'index.html\'" class="btn btn-primary">Find Properties</button></div>';
                return;
            }
            
            container.innerHTML = filteredBookings.map(booking => {
                const property = booking.property || {};
                const title = property.title || 'Property';
                const location = property.location || 'Kenya';
                const image = property.images?.[0] || 'images/placeholder-property.jpg';
                const checkIn = booking.checkIn ? new Date(booking.checkIn).toLocaleDateString() : 'N/A';
                const checkOut = booking.checkOut ? new Date(booking.checkOut).toLocaleDateString() : 'N/A';
                const total = booking.totalPrice || booking.price || 0;
                const status = booking.status || 'confirmed';
                const guests = booking.guests || 1;
                
                let statusBadge = '';
                let statusClass = '';
                if (status === 'confirmed') {
                    statusBadge = 'Confirmed';
                    statusClass = 'status-confirmed';
                } else if (status === 'pending') {
                    statusBadge = 'Pending';
                    statusClass = 'status-pending';
                } else if (status === 'cancelled') {
                    statusBadge = 'Cancelled';
                    statusClass = 'status-cancelled';
                } else {
                    statusBadge = 'Completed';
                    statusClass = 'status-confirmed';
                }
                
                return '<div class="booking-card glass p-5 mb-4">' +
                    '<div class="flex flex-col md:flex-row gap-4">' +
                        '<img src="' + image + '" alt="' + title + '" class="property-img" onerror="this.src=\'images/placeholder-property.jpg\'">' +
                        '<div class="flex-1">' +
                            '<h3 class="text-lg font-bold text-white mb-1">' + title + '</h3>' +
                            '<p class="text-white/60 text-sm mb-2">📍 ' + location + '</p>' +
                            '<p class="text-white/70 text-sm mb-1">📅 ' + checkIn + ' → ' + checkOut + '</p>' +
                            '<p class="text-white/70 text-sm mb-3">👤 ' + guests + ' Guest(s)</p>' +
                            '<div class="flex flex-wrap gap-2">' +
                                '<button onclick="viewBookingDetails(\'' + booking.id + '\')" class="btn btn-primary text-sm">View Details</button>' +
                                (status === 'confirmed' ? '<button onclick="cancelBooking(\'' + booking.id + '\')" class="btn btn-danger text-sm">Cancel</button>' : '') +
                            '</div>' +
                        '</div>' +
                        '<div class="text-right">' +
                            '<p class="text-xl font-bold text-white">KSh ' + total.toLocaleString() + '</p>' +
                            '<p class="text-white/50 text-xs mb-2">Total</p>' +
                            '<span class="status-badge ' + statusClass + '">' + statusBadge + '</span>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function filterBookings(filter) {
            currentFilter = filter;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + filter).classList.add('active');
            renderBookings();
        }

        function viewBookingDetails(bookingId) {
            const booking = allBookings.find(b => b.id === bookingId);
            if (!booking) return;
            
            const property = booking.property || {};
            const content = document.getElementById('bookingDetailsContent');
            const total = booking.totalPrice || booking.price || 0;
            
            content.innerHTML = 
                '<div class="space-y-4">' +
                    '<div class="flex items-center gap-4 p-4 bg-white/5 rounded-xl">' +
                        '<img src="' + (property.images?.[0] || 'images/placeholder-property.jpg') + '" class="w-20 h-16 rounded-lg object-cover">' +
                        '<div><h4 class="font-bold text-white">' + (property.title || 'Property') + '</h4><p class="text-white/60 text-sm">' + (property.location || 'Kenya') + '</p></div>' +
                    '</div>' +
                    '<div class="grid grid-cols-2 gap-4">' +
                        '<div class="p-3 bg-white/5 rounded-xl"><p class="text-white/50 text-xs">Check-in</p><p class="text-white font-medium">' + (booking.checkIn ? new Date(booking.checkIn).toLocaleDateString() : 'N/A') + '</p></div>' +
                        '<div class="p-3 bg-white/5 rounded-xl"><p class="text-white/50 text-xs">Check-out</p><p class="text-white font-medium">' + (booking.checkOut ? new Date(booking.checkOut).toLocaleDateString() : 'N/A') + '</p></div>' +
                        '<div class="p-3 bg-white/5 rounded-xl"><p class="text-white/50 text-xs">Guests</p><p class="text-white font-medium">' + (booking.guests || 1) + '</p></div>' +
                        '<div class="p-3 bg-white/5 rounded-xl"><p class="text-white/50 text-xs">Status</p><p class="text-white font-medium">' + (booking.status || 'confirmed') + '</p></div>' +
                    '</div>' +
                    '<div class="p-4 bg-white/5 rounded-xl">' +
                        '<p class="text-white/50 text-xs mb-2">Payment Summary</p>' +
                        '<div class="flex justify-between text-white/70 text-sm"><span>Accommodation</span><span>KSh ' + (total * 0.8).toLocaleString() + '</span></div>' +
                        '<div class="flex justify-between text-white/70 text-sm"><span>Cleaning fee</span><span>KSh ' + (total * 0.1).toLocaleString() + '</span></div>' +
                        '<div class="flex justify-between text-white/70 text-sm"><span>Service fee</span><span>KSh ' + (total * 0.1).toLocaleString() + '</span></div>' +
                        '<div class="flex justify-between text-white font-bold text-lg mt-2 pt-2 border-t border-white/20"><span>Total</span><span>KSh ' + total.toLocaleString() + '</span></div>' +
                    '</div>' +
                '</div>';
            
            document.getElementById('bookingDetailsModal').style.display = 'flex';
        }

        function closeBookingDetails() {
            document.getElementById('bookingDetailsModal').style.display = 'none';
        }

        function cancelBooking(bookingId) {
            currentCancelBookingId = bookingId;
            document.getElementById('cancelBookingModal').style.display = 'flex';
        }

        async function confirmCancelBooking() {
            if (!currentCancelBookingId) return;
            
            try {
                alert('Cancellation request submitted! You will be notified once processed.');
                document.getElementById('cancelBookingModal').style.display = 'none';
                currentCancelBookingId = null;
                loadBookings();
            } catch (error) {
                console.error('Error cancelling booking:', error);
                alert('Failed to cancel booking. Please try again.');
            }
        }

        function closeCancelModal() {
            document.getElementById('cancelBookingModal').style.display = 'none';
            currentCancelBookingId = null;
        }
    </script>
</body>
</html>
