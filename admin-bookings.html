<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Bookings Management - ViewOnce Airbnb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <script src="store.js"></script>
    <script src="api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #FF5A5F; --secondary: #484848; --accent: #00A699; --success: #10B981; --warning: #F59E0B; --error: #EF4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #F7F7F7; color: #222; }
        .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 280px; transform: translateX(-100%); transition: transform 0.3s; z-index: 1000; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); border-radius: 0 24px 24px 0; }
        .sidebar.active { transform: translateX(0); }
        .sidebar-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: all 0.3s; z-index: 999; }
        .sidebar-backdrop.active { opacity: 1; visibility: visible; }
        .sidebar-item { display: block; width: 100%; padding: 12px 16px; margin: 4px 0; background: transparent; border: none; color: white; text-align: left; cursor: pointer; font-weight: 500; font-size: 14px; border-radius: 12px; transition: all 0.3s; }
        .sidebar-item:hover { background: rgba(255, 90, 95, 0.15); padding-left: 20px; color: #FF5A5F; }
        .header { background: white; padding: 16px 24px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .glass { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { background: #e8484c; }
        .btn-success { background: var(--success); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-danger { background: var(--error); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-badge.success { background: #D1FAE5; color: #065F46; }
        .status-badge.warning { background: #FEF3C7; color: #92400E; }
        .status-badge.error { background: #FEE2E2; color: #991B1B; }
        .status-badge.info { background: #DBEAFE; color: #1E40AF; }
        .status-badge.pending { background: #FEF3C7; color: #92400E; }
        .data-row { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid #eee; }
        .data-row:hover { background: #f9f9f9; }
        .loading-spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <button onclick="closeSidebar()" title="Close sidebar" style="position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;color:white;font-size:18px;cursor:pointer;">×</button>
        <div style="padding: 80px 16px 20px;">
            <h2 class="font-bold text-lg text-white mb-4"><i class="fas fa-shield-alt mr-2"></i>Admin Panel</h2>
            <button onclick="window.location.href='admin-dashboard.html'" title="Go to Dashboard" class="sidebar-item"><i class="fas fa-home mr-2 w-6"></i>Dashboard</button>
            <button onclick="window.location.href='admin-payments.html'" title="Go to Payments" class="sidebar-item"><i class="fas fa-credit-card mr-2 w-6"></i>Payments</button>
            <button onclick="window.location.href='admin-bookings.html'" title="Go to Bookings" class="sidebar-item" style="background:rgba(255,90,95,0.2);"><i class="fas fa-calendar-check mr-2 w-6"></i>Bookings</button>
            <button onclick="window.location.href='customer-dashboard.html'" title="Go to Customers" class="sidebar-item"><i class="fas fa-users mr-2 w-6"></i>Customers</button>
            <button onclick="window.location.href='admin-properties.html'" title="Go to Properties" class="sidebar-item"><i class="fas fa-building mr-2 w-6"></i>Properties</button>
            <button onclick="logout()" title="Logout from admin panel" class="sidebar-item" style="background:rgba(239,68,68,0.3);margin-top:20px;"><i class="fas fa-sign-out-alt mr-2 w-6"></i>Logout</button>
        </div>
    </div>
    <div id="sidebarBackdrop" onclick="closeSidebar()" class="sidebar-backdrop"></div>

    <!-- Header -->
    <header class="header">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" style="background:#f1f1f1;border:none;padding:10px 16px;border-radius:12px;cursor:pointer;"><i class="fas fa-bars"></i></button>
            <h1 class="font-bold text-xl"><i class="fas fa-calendar-check text-pink-500 mr-2"></i>Bookings Management</h1>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-sm text-gray-500" id="adminName">Admin User</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-20 px-6 pb-6" style="max-width: 1400px; margin: 0 auto;">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
            <div class="glass p-6">
                <p class="text-gray-500 text-sm">Total Bookings</p>
                <p class="text-3xl font-bold" id="totalBookings">0</p>
            </div>
            <div class="glass p-6">
                <p class="text-gray-500 text-sm">Pending</p>
                <p class="text-3xl font-bold text-yellow-600" id="pendingBookings">0</p>
            </div>
            <div class="glass p-6">
                <p class="text-gray-500 text-sm">Confirmed</p>
                <p class="text-3xl font-bold text-green-600" id="confirmedBookings">0</p>
            </div>
            <div class="glass p-6">
                <p class="text-gray-500 text-sm">Cancelled</p>
                <p class="text-3xl font-bold text-red-600" id="cancelledBookings">0</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="glass p-6 mb-6">
            <div class="flex flex-wrap gap-4">
                <select id="statusFilter" class="input-field" style="width:auto;" onchange="filterBookings()">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
                <input type="date" id="startDate" class="input-field" style="width:auto;">
                <span class="self-center">to</span>
                <input type="date" id="endDate" class="input-field" style="width:auto;">
                <button onclick="applyDateFilter()" class="btn-primary">Filter</button>
            </div>
        </div>

        <!-- Bookings List -->
        <div class="glass p-6">
            <h3 class="font-bold text-lg mb-4">All Bookings</h3>
            <div id="bookingsList">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </main>

    <script>
        let bookings = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadBookings();
        });

        function loadBookings() {
            // Demo data
            bookings = [
                { id: 'BK001', customer: 'John Doe', customerEmail: 'john@example.com', customerPhone: '+254700000001', property: 'Luxury Villa in Karen', propertyAddress: 'Karen, Nairobi', host: 'Host David', hostEmail: 'david@example.com', amount: 25000, status: 'confirmed', date: '2024-01-20', checkIn: '2024-02-01', checkOut: '2024-02-05' },
                { id: 'BK002', customer: 'Jane Smith', customerEmail: 'jane@example.com', customerPhone: '+254700000002', property: 'Modern Apartment CBD', propertyAddress: 'CBD, Nairobi', host: 'Host Sarah', hostEmail: 'sarah@example.com', amount: 18000, status: 'pending', date: '2024-01-19', checkIn: '2024-02-10', checkOut: '2024-02-12' },
                { id: 'BK003', customer: 'Mike Johnson', customerEmail: 'mike@example.com', customerPhone: '+254700000003', property: 'Cozy Studio Westlands', propertyAddress: 'Westlands, Nairobi', host: 'Host Mike', hostEmail: 'mike@example.com', amount: 12000, status: 'completed', date: '2024-01-18', checkIn: '2024-01-25', checkOut: '2024-01-28' },
                { id: 'BK004', customer: 'Emily Brown', customerEmail: 'emily@example.com', customerPhone: '+254700000004', property: 'Beach House in Malindi', propertyAddress: 'Malindi, Kenya', host: 'Host David', hostEmail: 'david@example.com', amount: 45000, status: 'cancelled', date: '2024-01-17', checkIn: '2024-02-15', checkOut: '2024-02-20' }
            ];
            renderBookings(bookings);
            updateStats();
        }

        function renderBookings(bookingList) {
            const container = document.getElementById('bookingsList');
            if (!bookingList || bookingList.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">No bookings found</p>';
                return;
            }
            container.innerHTML = bookingList.map(b => `
                <div class="data-row">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full flex items-center justify-center bg-blue-100">
                            <i class="fas fa-calendar-check text-blue-500"></i>
                        </div>
                        <div>
                            <p class="font-bold">Booking #${b.id}</p>
                            <p class="text-sm text-gray-500">${b.customer}</p>
                            <p class="text-xs text-gray-400">${b.property}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-lg">KSh ${(b.amount || 0).toLocaleString()}</p>
                        <span class="status-badge ${b.status === 'completed' ? 'success' : b.status === 'pending' ? 'pending' : b.status === 'cancelled' ? 'error' : 'info'}">${b.status}</span>
                        <p class="text-xs text-gray-500 mt-1">${b.date}</p>
                    </div>
                    <div class="text-right ml-4">
                        <p class="text-sm"><span class="text-gray-500">Check-in:</span> ${b.checkIn}</p>
                        <p class="text-sm"><span class="text-gray-500">Check-out:</span> ${b.checkOut}</p>
                        <p class="text-sm"><span class="text-gray-500">Host:</span> ${b.host}</p>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalBookings').textContent = bookings.length;
            document.getElementById('pendingBookings').textContent = bookings.filter(b => b.status === 'pending').length;
            document.getElementById('confirmedBookings').textContent = bookings.filter(b => b.status === 'confirmed').length;
            document.getElementById('cancelledBookings').textContent = bookings.filter(b => b.status === 'cancelled').length;
        }

        function filterBookings() {
            const status = document.getElementById('statusFilter').value;
            if (status === 'all') {
                renderBookings(bookings);
            } else {
                renderBookings(bookings.filter(b => b.status === status));
            }
        }

        function applyDateFilter() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            let filtered = bookings;
            if (startDate) filtered = filtered.filter(b => b.date >= startDate);
            if (endDate) filtered = filtered.filter(b => b.date <= endDate);
            renderBookings(filtered);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('sidebarBackdrop').classList.add('active');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('sidebarBackdrop').classList.remove('active');
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'welcome.html';
        }
    </script>
</body>
</html>
